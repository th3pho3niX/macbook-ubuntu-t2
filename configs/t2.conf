# /etc/modules-load.d/t2.conf
# Kernel modules for Apple T2 Chip on MacBook Pro 2018
# Managed by: scripts/setup_t2.sh
#
# These modules are loaded automatically at boot.
# Manual load: modprobe <module_name>
# Verify:      lsmod | grep -E 'apple_bce|applesmc|vhci_hcd'

# T2 base communication (Keyboard, Trackpad bridge)
apple_bce

# SMC sensors and fan control
applesmc

# Virtual USB HCI for T2 keyboard/trackpad bridge
vhci_hcd
